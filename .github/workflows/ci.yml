name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (CPU torch plus package)
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch wheel. Smaller, and no CUDA on the runner.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[export,dev]"

      - name: Unit tests
        run: python -m pytest tests/ -q

      - name: Smoke test (synthetic train then eval, no mic, no TTS)
        run: python -m heed.cli smoke

      - name: Preprocessing parity (Python vs JS)
        run: |
          cd examples/inference_browser
          node verify-preprocessing.mjs
